<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Test Checkout</title>
    <meta name="description" content="Run a local test purchase for the blueprint workflow.">
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="landing-page utility-page">
    <main class="utility-shell">
      <section class="paywall-card">
        <p class="gold-kicker">Development Mode</p>
        <h1>Local Test Purchase</h1>
        <p>
          This simulates a paid Stripe checkout locally, sends the fulfillment email
          to the server console, unlocks the guide, and verifies the protected PDF flow.
        </p>
        <form class="test-checkout-form" action="/test/complete" method="post">
          <label for="email">Customer email</label>
          <input
            id="email"
            name="email"
            type="email"
            value="customer@example.com"
            autocomplete="email"
            required
          >
          <input type="hidden" name="package" value="bundle">
          <button class="primary-cta" type="submit">Complete Test Purchase</button>
        </form>
        <p class="paywall-note">
          This route is disabled automatically when <code>NODE_ENV=production</code>.
        </p>
      </section>
    </main>
  </body>
</html>
